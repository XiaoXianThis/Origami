name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal package
        run: |
          chmod +x scripts/package.sh
          ./scripts/package.sh "${{ steps.version.outputs.tag }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Origami-v${{ steps.version.outputs.tag }}-macos-universal.zip
            dist/Origami-v${{ steps.version.outputs.tag }}-macos-universal.dmg
          generate_release_notes: true
